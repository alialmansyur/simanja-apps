version: '3.8'

services:
  agenda-backend:
    build:
      context: ./apps/agenda-backend
      dockerfile: Dockerfile
    container_name: agenda-backend
    restart: unless-stopped
    ports:
      - "8102:80"
    volumes:
      - ./apps/agenda-backend:/var/www/html
    networks:
      - agenda-network

  agenda-dashboard:
    build:
      context: ./apps/agenda-dashboard
      dockerfile: Dockerfile
    container_name: agenda-dashboard
    restart: unless-stopped
    ports:
      - "8103:5173"
    volumes:
      - ./apps/agenda-dashboard:/app
      - /app/node_modules
    networks:
      - agenda-network
    command: sh -c "npm install && npm run dev -- --host"

  agenda-admin:
    build:
      context: ./apps/agenda-admin
      dockerfile: Dockerfile
    container_name: agenda-admin
    restart: unless-stopped
    ports:
      - "8104:5173"
    volumes:
      - ./apps/agenda-admin:/app
      - /app/node_modules
    networks:
      - agenda-network
    command: sh -c "npm install && npm run dev -- --host"

networks:
  agenda-network:
    driver: bridge

